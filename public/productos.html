<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — La Bodega del Turco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <link rel="icon" href="/images/logo.png" type="image/png">
</head>
<body>

  <header class="header">
    <div class="container header-inner">
      <a href="/" class="brand">
        <img src="/images/logo.png" alt="" class="brand-logo">
        <span class="brand-text">
          <span class="brand-name">La Bodega del Turco</span>
          <span class="brand-tagline">Ropa importada · Calidad global</span>
        </span>
      </a>
      <nav class="nav">
        <a href="/productos.html" class="nav-active">Catálogo</a>
        <a href="/#mayoristas">Por Mayor</a>
        <a href="/#contacto">Contacto</a>
      </nav>
      <button class="cart-btn" id="cartBtn" aria-label="Abrir selección">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M6 6h15l-1.5 9H7.5L6 6z"/><path d="M6 6L5 3H2"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/>
        </svg>
        <span class="cart-count" id="cartCount">0</span>
      </button>
    </div>
  </header>

  <main>
    <section class="section catalogo catalogo-page">
      <div class="catalogo-inner">
        <div class="catalogo-intro">
          <h1 class="catalogo-title">Productos</h1>
          <p class="filtro-activo" id="filtroActivo">Mostrando todos los productos</p>
          <p class="result-count" id="resultCount"></p>
        </div>

        <div class="productos-filtros">
          <div class="filtros-genero" role="tablist" aria-label="Filtrar por género">
            <button class="tab active" data-filtro-genero="todos" role="tab">Todos</button>
            <button class="tab" data-filtro-genero="mujer" role="tab">Mujer</button>
            <button class="tab" data-filtro-genero="hombre" role="tab">Hombre</button>
            <button class="tab" data-filtro-genero="nina" role="tab">Niña</button>
            <button class="tab" data-filtro-genero="nino" role="tab">Niño</button>
          </div>

          <div class="filtros-sub" aria-label="Filtrar por tipo de ropa">
            <button class="chip active" data-filtro-sub="todos">Ver todo</button>
            <button class="chip" data-filtro-sub="ropa-interior">Ropa Interior</button>
            <button class="chip" data-filtro-sub="medias">Medias</button>
            <button class="chip" data-filtro-sub="ropa-deportiva">Ropa Deportiva</button>
            <button class="chip" data-filtro-sub="otros">Otros</button>
          </div>
        </div>

        <div class="productos-grid" id="productosGrid">
          <p class="loading">Cargando productos...</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="footer-brand">La Bodega del Turco</span>
      <span class="footer-copy">&copy; 2026 — Ropa importada · Calidad global · Al mejor precio</span>
      <a href="/admin.html" class="footer-admin">Admin</a>
    </div>
  </footer>

  <div class="modal-overlay" id="cartModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Tu selección</h2>
        <button class="modal-close" id="closeCart" aria-label="Cerrar">&times;</button>
      </div>
      <div class="modal-body" id="cartItems">
        <p class="cart-empty">Aún no has seleccionado productos.</p>
      </div>
      <div class="modal-footer">
        <p class="cart-total" id="cartTotal"></p>
        <button class="btn btn-whatsapp btn-full" id="whatsappBtn" disabled>Enviar por WhatsApp</button>
        <button class="btn btn-ghost btn-full" id="clearCart">Vaciar selección</button>
      </div>
    </div>
  </div>

  <script src="/js/categories.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/products-shared.js"></script>
  <script src="/js/productos.js"></script>
</body>
</html>
