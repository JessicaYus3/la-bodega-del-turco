<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Productos — La Bodega del Turco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css?v=28">
  <link rel="icon" href="/images/logo.png" type="image/png">
</head>
<body>

  <header class="header header-store">
    <div class="header-top">
      <div class="container header-top-inner">
        <a href="/" class="brand">
          <img src="/images/logo.png" alt="La Bodega del Turco" class="brand-logo">
          <span class="brand-text">
            <span class="brand-name">La Bodega del Turco</span>
            <span class="brand-tagline">Ropa Importada al por Mayor</span>
          </span>
        </a>

        <div class="header-tools">
          <form class="header-search" action="/productos.html" method="get" role="search">
            <input type="search" name="q" placeholder="Buscar medias, bóxers, leggins…" aria-label="Buscar productos" autocomplete="off">
          </form>
          <button class="cart-btn cart-btn-compact" id="cartBtn" aria-label="Abrir selección">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M6 6h15l-1.5 9H7.5L6 6z"/><path d="M6 6L5 3H2"/><circle cx="9" cy="20" r="1"/><circle cx="18" cy="20" r="1"/>
            </svg>
            <span class="cart-count" id="cartCount">0</span>
          </button>
          <a href="#" id="headerWhatsapp" class="btn-header-wa" target="_blank" rel="noopener noreferrer" aria-label="Cotizar por WhatsApp">
            <svg class="btn-header-wa-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.435 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
          </a>
          <button class="nav-toggle" id="navToggle" type="button" aria-label="Abrir menú" aria-expanded="false" aria-controls="headerNavPanel">
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
            <span class="nav-toggle-bar"></span>
          </button>
        </div>
      </div>
    </div>

    <div class="header-nav-bar">
      <div class="container header-nav-bar-inner">
        <nav class="nav nav-primary" id="headerNavDesktop" aria-label="Principal">
          <a href="/productos.html" class="nav-active">Productos</a>
          <a href="/#faq">Nosotros</a>
        </nav>
      </div>
    </div>

    <div class="header-nav-panel" id="headerNavPanel">
      <nav class="nav nav-primary" aria-label="Principal móvil">
        <a href="/productos.html" class="nav-active">Productos</a>
        <a href="/#faq">Nosotros</a>
      </nav>
      <form class="header-search header-search-mobile" action="/productos.html" method="get" role="search">
        <input type="search" name="q" placeholder="Buscar medias, bóxers, leggins…" aria-label="Buscar productos" autocomplete="off">
      </form>
    </div>
  </header>

  <main>
    <section class="section catalogo catalogo-page">
      <div class="catalogo-inner">
        <div class="catalogo-intro">
          <h1 class="catalogo-title">Productos</h1>
          <p class="filtro-activo" id="filtroActivo">Mostrando todos los productos</p>
          <p class="result-count" id="resultCount"></p>
        </div>

        <div class="productos-filtros">
          <div class="filtros-lineas" aria-label="Filtrar por línea de productos">
            <button class="chip active" data-filtro-linea="todos">Todos</button>
            <button class="chip" data-filtro-linea="medias">Medias</button>
            <button class="chip" data-filtro-linea="ropa-interior">Ropa Interior</button>
            <button class="chip" data-filtro-linea="ropa-deportiva">Deportivo</button>
            <button class="chip" data-filtro-linea="infantil">Infantil</button>
          </div>
        </div>

        <div class="productos-grid" id="productosGrid">
          <p class="loading">Cargando productos...</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-inner">
      <span class="footer-brand">La Bodega del Turco</span>
      <span class="footer-copy">&copy; 2026 — Ropa importada · Calidad global · Al mejor precio</span>
      <a href="/admin.html" class="footer-admin">Admin</a>
    </div>
  </footer>

  <div class="modal-overlay" id="cartModal">
    <div class="modal">
      <div class="modal-header">
        <h2>Tu selección</h2>
        <button class="modal-close" id="closeCart" aria-label="Cerrar">&times;</button>
      </div>
      <div class="modal-body" id="cartItems">
        <p class="cart-empty">Aún no has seleccionado productos.</p>
      </div>
      <div class="modal-footer">
        <p class="cart-total" id="cartTotal"></p>
        <button class="btn btn-whatsapp btn-full" id="whatsappBtn" disabled>Enviar por WhatsApp</button>
        <button class="btn btn-ghost btn-full" id="clearCart">Vaciar selección</button>
      </div>
    </div>
  </div>

  <script src="/js/categories.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/products-shared.js"></script>
  <script src="/js/header.js"></script>
  <script src="/js/productos.js"></script>
</body>
</html>
